kind = "web"
previewPath = "/"
title = "GO TOUR"
version = "1.0.0"
id = "artifacts/go-tour"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18089

[services.development]
run = "pnpm --filter @workspace/go-tour run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/go-tour", "run", "build" ]
publicDir = "artifacts/go-tour/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18089"
BASE_PATH = "/"
